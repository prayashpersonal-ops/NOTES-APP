<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTES APP</title>
    <style>
        /* GOOGLE FONT */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* BACKGROUND */
body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* TITLE */
h1 {
    margin-top: 40px;
    font-size: 2.5rem;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* FORM */
form {
    margin-top: 30px;
    background: #111;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 0 20px rgba(0, 114, 255, 0.2);
    animation: fadeIn 0.6s ease-in-out;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: #1f1f1f;
    color: white;
    transition: 0.3s;
}

input:focus, textarea:focus {
    background: #2a2a2a;
    box-shadow: 0 0 8px #0072ff;
}

/* BUTTON */
button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 10px #0072ff;
}

/* NOTES CONTAINER */
.notes {
    margin-top: 30px;
    width: 350px;
}

/* SINGLE NOTE */
.note {
    background: #111;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0, 114, 255, 0.1);
    animation: slideUp 0.4s ease;
    position: relative;
}

.note h3 {
    margin-bottom: 5px;
    color: #00c6ff;
}

.note p {
    font-size: 0.9rem;
    color: #ccc;
}

/* DELETE BUTTON */
.note a {
    position: absolute;
    right: 15px;
    top: 15px;
    text-decoration: none;
    color: #ff4d4d;
    font-size: 0.8rem;
    transition: 0.3s;
}

.note a:hover {
    color: red;
    transform: scale(1.1);
}

/* FOOTER */
footer {
    margin-top: auto;
    padding: 20px;
    font-size: 0.8rem;
    color: #888;
    letter-spacing: 1px;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
</head>
<body>
    <h1>NOTES APP</h1>
    <form method="POST" action="/add" class="addNotes">
        <input type="text" placeholder="TITLE" name="title" required>
        <textarea name="textarea" placeholder="write you note here..." required></textarea>
        <button type="submit" name="addBtn">ADD NOTE</button>
    </form>

    <div class="notes">
        {% for note in notes%}
        <div class="note">
            <h3 class="title">{{note.title}}</h3>
            <p class="textarea">{{note.textarea}}</p>
            <a href="/delete/{{ loop.index0 }}">Delete</a>
        </div>
        {% endfor%}
    </div>
    <footer>Made by Prayash ⚡</footer>
</body>
</html>
